name: "Secret Policy (Sprint K)"

# Sprint K: CI secret policy enforcement.
# Verifies that no real credentials appear in tracked configuration files.
#
# Policy: Placeholder values are PERMITTED in tracked files (appsettings.json /
# appsettings.Development.json) so that the repository can be cloned and built
# without any secrets. Real signing keys and credentials must arrive via
# .NET User Secrets (local dev) or environment variables (CI/staging/prod).
#
# The application enforces this at startup: Program.cs throws if a placeholder
# value is used at runtime, ensuring fail-closed behaviour.
#
# This workflow fails when:
#   1. A tracked JSON config file contains a signing key that is NOT a known
#      placeholder and NOT empty — i.e., a real secret was committed.
#   2. Any [Category=SecretPolicy] test fails (they assert the same invariant
#      from within the test suite so both gates must pass independently).

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  secret-policy-scan:
    name: "Secret Policy ▸ Config File Scan"
    if: github.event.action != 'closed' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ── Step 1: Scan tracked JSON config files for real signing keys ──────
    #
    # Uses `git ls-files` to enumerate ALL tracked appsettings*.json files so
    # newly added config files cannot bypass the policy gate.
    #
    # Allowed values for Jwt:SigningKey in any tracked file:
    #   "REPLACE_WITH_A_MIN_32_CHAR_SECRET"             (appsettings.json)
    #   "DEV_ONLY_REPLACE_WITH_A_MIN_32_CHAR_SECRET"    (appsettings.Development.json)
    #   ""  (empty — key must be provided at runtime)
    #
    # Allowed values for IntakeInvite:SigningKey in any tracked file:
    #   Any value starting with "REPLACE_"
    #   ""  (empty)
    #
    # The scan FAILS if a file cannot be parsed (explicit error, not a silent pass).
    - name: Scan tracked appsettings files for real signing keys
      run: |
        set -e

        # Enumerate every tracked appsettings*.json across the repository.
        mapfile -t TRACKED_FILES < <(git ls-files -- '*/appsettings*.json' 'appsettings*.json')

        if [ ${#TRACKED_FILES[@]} -eq 0 ]; then
          echo "ℹ️  No tracked appsettings*.json files found — nothing to scan."
          exit 0
        fi

        echo "Scanning ${#TRACKED_FILES[@]} tracked appsettings file(s)..."

        # Write the scanner to a temp file so inline quoting stays clean.
        cat > /tmp/scan_secrets.py << 'PYEOF'
        import json, sys

        JWT_PLACEHOLDERS = {
            "REPLACE_WITH_A_MIN_32_CHAR_SECRET",
            "DEV_ONLY_REPLACE_WITH_A_MIN_32_CHAR_SECRET",
            "",
        }
        INTAKE_INVITE_PREFIX = "REPLACE_"

        fail = False

        for filepath in sys.argv[1:]:
            filepath = filepath.strip()
            if not filepath:
                continue

            # Parse error must be surfaced immediately — do not silently pass.
            try:
                with open(filepath) as fh:
                    data = json.load(fh)
            except json.JSONDecodeError as exc:
                print(f"❌ PARSE ERROR: {filepath} is not valid JSON: {exc}", flush=True)
                fail = True
                continue
            except OSError as exc:
                print(f"❌ READ ERROR: {filepath}: {exc}", flush=True)
                fail = True
                continue

            # ── Jwt:SigningKey ──────────────────────────────────────────
            jwt_key = data.get("Jwt", {}).get("SigningKey", None)
            if jwt_key is not None:
                if jwt_key not in JWT_PLACEHOLDERS:
                    print(
                        f"❌ FAIL: {filepath} contains a non-placeholder Jwt:SigningKey.\n"
                        f"   Policy: use a REPLACE_ placeholder or empty string in tracked files.\n"
                        f"   Inject real keys via setup-dev-secrets.sh / UserSecrets / CI env var.",
                        flush=True,
                    )
                    fail = True
                else:
                    print(f"✅ OK:   {filepath} — Jwt:SigningKey is a permitted placeholder or empty.", flush=True)

            # ── IntakeInvite:SigningKey ──────────────────────────────────
            intake_key = data.get("IntakeInvite", {}).get("SigningKey", None)
            if intake_key is not None:
                if intake_key != "" and not intake_key.startswith(INTAKE_INVITE_PREFIX):
                    print(
                        f"❌ FAIL: {filepath} contains a non-placeholder IntakeInvite:SigningKey.\n"
                        f"   Policy: use a REPLACE_ placeholder or empty string in tracked files.\n"
                        f"   Inject real keys via setup-dev-secrets.sh / UserSecrets / CI env var.",
                        flush=True,
                    )
                    fail = True
                else:
                    print(f"✅ OK:   {filepath} — IntakeInvite:SigningKey is a permitted placeholder or empty.", flush=True)

        if fail:
            print("\n❌ Secret policy scan FAILED. See details above.", flush=True)
            sys.exit(1)
        else:
            print("\n✅ Secret policy scan passed: all tracked signing keys are placeholders or empty.", flush=True)
        PYEOF

        python3 /tmp/scan_secrets.py "${TRACKED_FILES[@]}"

    # ── Step 2: Run [Category=SecretPolicy] tests ─────────────────────────
    #
    # These tests assert the same invariant programmatically so the check is
    # independently validated through the normal test pipeline.
    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.417'

    - name: Restore dependencies
      run: |
        dotnet restore src/PTDoc.Infrastructure/PTDoc.Infrastructure.csproj
        dotnet restore tests/PTDoc.Tests/PTDoc.Tests.csproj

    - name: Build
      run: |
        dotnet build src/PTDoc.Infrastructure/PTDoc.Infrastructure.csproj --no-restore --configuration Release
        dotnet build tests/PTDoc.Tests/PTDoc.Tests.csproj --no-restore --configuration Release

    - name: Run SecretPolicy tests
      run: |
        dotnet test tests/PTDoc.Tests/PTDoc.Tests.csproj \
          --no-build \
          --configuration Release \
          --filter "Category=SecretPolicy" \
          --verbosity normal \
          --logger "trx;LogFileName=secret-policy-results.trx"

    - name: Publish SecretPolicy test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: "Secret Policy Test Results"
        path: '**/secret-policy-results.trx'
        reporter: dotnet-trx
        fail-on-error: true
