name: "Secret Policy (Sprint K)"

# Sprint K: CI secret policy enforcement.
# Verifies that no real credentials appear in tracked configuration files.
#
# Policy: Placeholder values are PERMITTED in tracked files (appsettings.json /
# appsettings.Development.json) so that the repository can be cloned and built
# without any secrets. Real signing keys and credentials must arrive via
# .NET User Secrets (local dev) or environment variables (CI/staging/prod).
#
# The application enforces this at startup: Program.cs throws if a placeholder
# value is used at runtime, ensuring fail-closed behaviour.
#
# This workflow fails when:
#   1. A tracked JSON config file contains a signing key that is NOT a known
#      placeholder and NOT empty — i.e., a real secret was committed.
#   2. Any [Category=SecretPolicy] test fails (they assert the same invariant
#      from within the test suite so both gates must pass independently).

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  secret-policy-scan:
    name: "Secret Policy ▸ Config File Scan"
    if: github.event.action != 'closed' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ── Step 1: Scan tracked JSON config files for real signing keys ──────
    #
    # Allowed values for Jwt:SigningKey in tracked files:
    #   "REPLACE_WITH_A_MIN_32_CHAR_SECRET"             (appsettings.json)
    #   "DEV_ONLY_REPLACE_WITH_A_MIN_32_CHAR_SECRET"    (appsettings.Development.json)
    #   ""  (empty — key must be provided at runtime)
    #
    # Allowed values for IntakeInvite:SigningKey in tracked files:
    #   Any value starting with "REPLACE_"
    #   ""  (empty)
    #
    # Fail if any signing key in a tracked JSON file does not match the above.
    - name: Scan config files for real signing keys
      run: |
        set -e
        FAIL=0

        # ── JWT signing key check ─────────────────────────────────────────
        JWT_PLACEHOLDERS=(
          "REPLACE_WITH_A_MIN_32_CHAR_SECRET"
          "DEV_ONLY_REPLACE_WITH_A_MIN_32_CHAR_SECRET"
          ""
        )

        check_jwt_key() {
          local file="$1"
          if [ ! -f "$file" ]; then
            echo "⚠️  Config file not found: $file (skipping)"
            return 0
          fi

          # Extract the raw value of Jwt.SigningKey using python json parser
          local key
          key=$(python3 -c "
        import json, sys
        try:
            data = json.load(open('$file'))
            print(data.get('Jwt', {}).get('SigningKey', ''))
        except Exception as e:
            print('')
        " 2>/dev/null || echo "")

          local allowed=false
          for p in "${JWT_PLACEHOLDERS[@]}"; do
            if [ "$key" = "$p" ]; then
              allowed=true
              break
            fi
          done

          if [ "$allowed" = "false" ]; then
            echo "❌ FAIL: $file contains a non-placeholder Jwt:SigningKey."
            echo "   Policy: tracked config files must use a known placeholder or empty string."
            echo "   Use setup-dev-secrets.sh / UserSecrets / CI env var instead."
            return 1
          else
            echo "✅ OK: $file Jwt:SigningKey is an allowed placeholder or empty."
            return 0
          fi
        }

        check_jwt_key "src/PTDoc.Api/appsettings.json"       || FAIL=1
        check_jwt_key "src/PTDoc.Api/appsettings.Development.json" || FAIL=1

        # ── IntakeInvite signing key check ────────────────────────────────
        check_intake_invite_key() {
          local file="$1"
          if [ ! -f "$file" ]; then
            echo "⚠️  Config file not found: $file (skipping)"
            return 0
          fi

          local key
          key=$(python3 -c "
        import json, sys
        try:
            data = json.load(open('$file'))
            print(data.get('IntakeInvite', {}).get('SigningKey', ''))
        except Exception as e:
            print('')
        " 2>/dev/null || echo "")

          # Must be empty or start with REPLACE_
          if [ -z "$key" ] || [[ "$key" == REPLACE_* ]]; then
            echo "✅ OK: $file IntakeInvite:SigningKey is an allowed placeholder or empty."
            return 0
          else
            echo "❌ FAIL: $file contains a non-placeholder IntakeInvite:SigningKey."
            echo "   Policy: tracked config files must use a REPLACE_ placeholder or empty string."
            echo "   Use setup-dev-secrets.sh / UserSecrets / CI env var instead."
            return 1
          fi
        }

        check_intake_invite_key "src/PTDoc.Web/appsettings.Development.json" || FAIL=1
        check_intake_invite_key "src/PTDoc.Web/appsettings.json"             || FAIL=1

        # ── Summary ───────────────────────────────────────────────────────
        if [ "$FAIL" -eq 0 ]; then
          echo ""
          echo "✅ Secret policy scan passed: all tracked config signing keys are placeholders or empty."
        else
          echo ""
          echo "❌ Secret policy scan FAILED. See details above."
          echo "   Remove any real signing keys from tracked files."
          echo "   Real secrets must be injected via UserSecrets or environment variables."
          exit 1
        fi

    # ── Step 2: Run [Category=SecretPolicy] tests ─────────────────────────
    #
    # These tests assert the same invariant programmatically so the check is
    # independently validated through the normal test pipeline.
    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.417'

    - name: Restore dependencies
      run: |
        dotnet restore src/PTDoc.Infrastructure/PTDoc.Infrastructure.csproj
        dotnet restore tests/PTDoc.Tests/PTDoc.Tests.csproj

    - name: Build
      run: |
        dotnet build src/PTDoc.Infrastructure/PTDoc.Infrastructure.csproj --no-restore --configuration Release
        dotnet build tests/PTDoc.Tests/PTDoc.Tests.csproj --no-restore --configuration Release

    - name: Run SecretPolicy tests
      run: |
        dotnet test tests/PTDoc.Tests/PTDoc.Tests.csproj \
          --no-build \
          --configuration Release \
          --filter "Category=SecretPolicy" \
          --verbosity normal \
          --logger "trx;LogFileName=secret-policy-results.trx"

    - name: Publish SecretPolicy test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: "Secret Policy Test Results"
        path: '**/secret-policy-results.trx'
        reporter: dotnet-trx
        fail-on-error: true
