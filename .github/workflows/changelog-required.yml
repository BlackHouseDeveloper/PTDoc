name: Changelog required

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  pull-requests: read

jobs:
  changelog-required:
    name: Enforce CHANGELOG update
    runs-on: ubuntu-latest
    steps:
      - name: Enforce docs/CHANGELOG.md updated (or label no-changelog)
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed("This workflow must run on pull_request events.");
              return;
            }

            const labels = (pr.labels || []).map(l => l.name);
            const skipLabel = "no-changelog";

            if (labels.includes(skipLabel)) {
              core.info(`Label '${skipLabel}' present — skipping changelog requirement.`);
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const touched = files.some(f => f.filename === "docs/CHANGELOG.md");

            if (!touched) {
              core.setFailed(
                "docs/CHANGELOG.md must be updated in this PR (add an entry under [Unreleased]), " +
                "or add the label 'no-changelog' to explicitly bypass."
              );
            } else {
              core.info("docs/CHANGELOG.md updated — OK.");
            }
