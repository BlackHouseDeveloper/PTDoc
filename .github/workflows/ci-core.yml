name: "Core CI"

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Enable verbose/diagnostic output for troubleshooting'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (Linux Core)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', '**/*.csproj', '.config/dotnet-tools.json') }}

    - name: Generate ephemeral CI secrets
      run: |
        echo "Jwt__SigningKey=$(openssl rand -base64 64)" >> "$GITHUB_ENV"
        echo "IntakeInvite__SigningKey=$(openssl rand -base64 32)" >> "$GITHUB_ENV"

    - name: Restore dependencies
      run: dotnet restore tests/PTDoc.Tests/PTDoc.Tests.csproj

    - name: Build Tests
      run: dotnet build tests/PTDoc.Tests/PTDoc.Tests.csproj --no-restore --configuration Release

    - name: Format check
      run: |
        dotnet format src/PTDoc.Core/PTDoc.Core.csproj --verify-no-changes --verbosity diagnostic
        dotnet format src/PTDoc.Application/PTDoc.Application.csproj --verify-no-changes --verbosity diagnostic
        dotnet format src/PTDoc.Infrastructure/PTDoc.Infrastructure.csproj --verify-no-changes --verbosity diagnostic
        dotnet format src/PTDoc.Api/PTDoc.Api.csproj --verify-no-changes --verbosity diagnostic
        dotnet format tests/PTDoc.Tests/PTDoc.Tests.csproj --verify-no-changes --verbosity diagnostic

    - name: Run Core CI tests
      env:
        TEST_VERBOSITY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_mode == 'true' && 'detailed' || 'normal' }}
      run: |
        dotnet test tests/PTDoc.Tests/PTDoc.Tests.csproj \
          --no-build \
          --configuration Release \
          --filter "Category=CoreCi" \
          --verbosity "$TEST_VERBOSITY" \
          --logger "trx;LogFileName=test-results.trx"

    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results
        path: '**/test-results.trx'
        reporter: dotnet-trx
        fail-on-error: true
