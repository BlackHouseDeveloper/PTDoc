name: "Deploy Beta"

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: beta-deployment
  cancel-in-progress: false

env:
  DOTNET_CONFIGURATION: Release
  WEB_PROJECT: src/PTDoc.Web/PTDoc.Web.csproj
  API_PROJECT: src/PTDoc.Api/PTDoc.Api.csproj
  TEST_PROJECT: tests/PTDoc.Tests/PTDoc.Tests.csproj
  AZURE_RESOURCE_GROUP: PTDoc-prod
  WEB_APP_NAME: ptdoc-web-prod
  API_APP_NAME: ptdoc-api-plan

jobs:
  build-test-publish:
    name: Build, Test, and Publish
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', '**/*.csproj', '.config/dotnet-tools.json') }}

    - name: Generate ephemeral CI secrets
      run: |
        echo "Jwt__SigningKey=$(openssl rand -base64 64)" >> "$GITHUB_ENV"
        echo "IntakeInvite__SigningKey=$(openssl rand -base64 32)" >> "$GITHUB_ENV"

    - name: Restore dependencies
      run: |
        dotnet restore "$TEST_PROJECT"
        dotnet restore "$WEB_PROJECT"
        dotnet restore "$API_PROJECT"

    - name: Build tests
      run: dotnet build "$TEST_PROJECT" --no-restore --configuration "$DOTNET_CONFIGURATION"

    - name: Run tests
      run: |
        dotnet test "$TEST_PROJECT" \
          --no-build \
          --configuration "$DOTNET_CONFIGURATION" \
          --verbosity normal \
          --logger "trx;LogFileName=beta-deploy-results.trx"

    - name: Publish Web
      run: dotnet publish "$WEB_PROJECT" --no-restore --configuration "$DOTNET_CONFIGURATION" -o ./publish/web

    - name: Verify Web static assets
      run: |
        test -f ./publish/web/wwwroot/_content/PTDoc.UI/css/app.css
        test -f ./publish/web/wwwroot/_content/PTDoc.UI/PTDoc.UI.bundle.scp.css
        test -f ./publish/web/wwwroot/_content/PTDoc.UI/js/theme.js
        test -f ./publish/web/wwwroot/_content/PTDoc.UI/ptdoclogo.png
        test -f ./publish/web/wwwroot/PTDoc.Web.styles.css
        test -f ./publish/web/wwwroot/js/reconnect.js

    - name: Publish API
      run: dotnet publish "$API_PROJECT" --no-restore --configuration "$DOTNET_CONFIGURATION" -o ./publish/api

    - name: Upload Web artifact
      uses: actions/upload-artifact@v4
      with:
        name: ptdoc-web-beta
        path: ./publish/web
        if-no-files-found: error

    - name: Upload API artifact
      uses: actions/upload-artifact@v4
      with:
        name: ptdoc-api-beta
        path: ./publish/api
        if-no-files-found: error

  deploy-web:
    name: Deploy Web App Service
    needs: [build-test-publish, deploy-api]
    runs-on: ubuntu-latest
    environment: beta

    steps:
    - name: Download Web artifact
      uses: actions/download-artifact@v4
      with:
        name: ptdoc-web-beta
        path: ./publish/web

    - name: Sign in to Azure
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Validate Web hosting prerequisites
      run: |
        config="$(az webapp config show \
          --resource-group "$AZURE_RESOURCE_GROUP" \
          --name "$WEB_APP_NAME" \
          --output json)"
        site="$(az webapp show \
          --resource-group "$AZURE_RESOURCE_GROUP" \
          --name "$WEB_APP_NAME" \
          --output json)"
        test "$(jq -r '.alwaysOn' <<< "$config")" = true
        test "$(jq -r '.webSocketsEnabled' <<< "$config")" = true
        test "$(jq -r '.clientAffinityEnabled' <<< "$site")" = true
        test "$(jq -r '.remoteDebuggingEnabled' <<< "$config")" = false
        test "$(jq -r '.healthCheckPath' <<< "$config")" = /health/live

    - name: Deploy Web directly to Beta
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.WEB_APP_NAME }}
        package: ./publish/web

    - name: Validate Web after deployment
      run: |
        curl --fail --silent --show-error --retry 6 --retry-delay 5 \
          "https://ptdoc.bhdevsites.com/health/live"
        curl --fail --silent --show-error --retry 6 --retry-delay 5 \
          "https://ptdoc.bhdevsites.com/health/ready"
        curl --fail --silent --show-error \
          "https://ptdoc.bhdevsites.com/_content/PTDoc.UI/css/app.css" \
          --output /dev/null
        curl --fail --silent --show-error --request POST \
          "https://ptdoc.bhdevsites.com/_blazor/negotiate?negotiateVersion=1" \
          | jq -e '.availableTransports | any(.transport == "WebSockets")' >/dev/null

  deploy-api:
    name: Deploy API App Service
    needs: build-test-publish
    runs-on: ubuntu-latest
    environment: beta

    steps:
    - name: Download API artifact
      uses: actions/download-artifact@v4
      with:
        name: ptdoc-api-beta
        path: ./publish/api

    - name: Sign in to Azure
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Validate API hosting and seed settings
      run: |
        production_settings="$(az webapp config appsettings list \
          --resource-group "$AZURE_RESOURCE_GROUP" \
          --name "$API_APP_NAME" \
          --output json)"
        test "$(jq -r '.[] | select(.name == "BetaAccess__AllowStartupSeed") | .value' <<< "$production_settings")" = true
        test "$(jq -r '.[] | select(.name == "BetaAccess__SeedLockTimeoutSeconds") | .value' <<< "$production_settings")" = 15
        config="$(az webapp config show \
          --resource-group "$AZURE_RESOURCE_GROUP" \
          --name "$API_APP_NAME" \
          --output json)"
        test "$(jq -r '.alwaysOn' <<< "$config")" = true
        test "$(jq -r '.remoteDebuggingEnabled' <<< "$config")" = false
        test "$(jq -r '.healthCheckPath' <<< "$config")" = /health/live

    - name: Deploy API directly to Beta
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.API_APP_NAME }}
        package: ./publish/api

    - name: Validate API and seeded beta access after deployment
      env:
        PTDOC_BETA_SEED_PIN: ${{ secrets.PTDOC_BETA_SEED_PIN }}
      run: |
        curl --fail --silent --show-error --retry 6 --retry-delay 5 \
          "https://api-ptdoc.bhdevsites.com/health/live"
        curl --fail --silent --show-error --retry 6 --retry-delay 5 \
          "https://api-ptdoc.bhdevsites.com/health/ready"
        for username in january.beta dani.beta pta.beta patient.beta; do
          status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --header 'Content-Type: application/json' \
            --data "{\"username\":\"${username}\",\"pin\":\"${PTDOC_BETA_SEED_PIN}\"}" \
            'https://api-ptdoc.bhdevsites.com/api/v1/auth/pin-login')"
          test "$status" = "200"
          echo "Seeded beta login smoke passed for ${username}."
        done
