<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PTDoc verification code</title>
</head>
<body style="margin:0;padding:0;background:#f6f8fb;color:#1f2933;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f6f8fb;padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #d9e2ec;border-radius:8px;">
          <tr>
            <td style="padding:24px;">
              <h1 style="margin:0 0 16px;font-size:22px;line-height:1.3;color:#102a43;">PTDoc verification code</h1>
              <p style="margin:0 0 16px;font-size:16px;line-height:1.5;">Use this code to continue secure intake access.</p>
              <p style="margin:0 0 16px;font-size:28px;line-height:1.2;font-weight:700;letter-spacing:0;color:#102a43;">{{Code}}</p>
              <p style="margin:0;font-size:14px;line-height:1.5;color:#52616b;">This code expires in {{ExpiresMinutes}} minutes.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
