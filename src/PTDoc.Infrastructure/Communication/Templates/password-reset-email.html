<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset your PTDoc password</title>
</head>
<body style="margin:0;padding:0;background:#f6f8fb;color:#1f2933;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f6f8fb;padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #d9e2ec;border-radius:8px;">
          <tr>
            <td style="padding:24px;">
              <h1 style="margin:0 0 16px;font-size:22px;line-height:1.3;color:#102a43;">Reset your PTDoc password</h1>
              <p style="margin:0 0 16px;font-size:16px;line-height:1.5;">Use the secure link below to reset your password.</p>
              <p style="margin:0 0 20px;">
                <a href="{{Link}}" style="display:inline-block;background:#2563eb;color:#ffffff;text-decoration:none;border-radius:6px;padding:12px 18px;font-size:16px;">Reset password</a>
              </p>
              <p style="margin:0 0 16px;font-size:14px;line-height:1.5;color:#52616b;">This link expires in {{ExpiresMinutes}} minutes. If you did not request this, you can ignore this message.</p>
              <p style="margin:0;font-size:13px;line-height:1.5;color:#627d98;word-break:break-all;">{{Link}}</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
